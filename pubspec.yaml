name: fajr_app
description: "تطبيق منبه الفجر والتقويم - Fajr Alarm & Prayer Calendar"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Prayer time calculation (offline, Umm al-Qura)
  adhan: ^2.0.0

  # Native alarm engine (rings even when app is killed)
  alarm: ^5.2.1

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Sound file picking + stable storage (used by settings + test-play)
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  audioplayers: ^6.1.0

  # Calendar + Hijri dates
  table_calendar: ^3.1.2
  hijri: ^3.0.0

  # Storage
  shared_preferences: ^2.3.2

  # Fonts (Tajawal)
  google_fonts: ^6.2.1

  # Misc
  intl: any
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
