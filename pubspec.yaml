name: fajr_app
description: "تطبيق منبه الفجر والتقويم - Fajr Alarm & Prayer Calendar"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Prayer time calculation (fully offline, supports Umm al-Qura)
  adhan: ^2.0.0

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Alarms & notifications
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.4
  audioplayers: ^6.1.0

  # Sound file picking + stable storage
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # Calendar + Hijri dates
  table_calendar: ^3.1.2
  hijri: ^3.0.0

  # Storage
  shared_preferences: ^2.3.2

  # Fonts (Tajawal)
  google_fonts: ^6.2.1

  # Misc
  timezone: ^0.9.4
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
